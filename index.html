<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<title>CASINO PLAYER SCREENING — 08 APR 2026</title>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;border-radius:0!important}
:root{--bg-hero:#000;--bg-body:#111;--bg-card:#1a1a1a;--text-primary:#fff;--text-secondary:#bbbbbb;--text-meta:#757575;--accent:#1c69d4;--border:rgba(255,255,255,0.08);--green:#2ecc71;--red:#e74c3c}
body{font-family:Helvetica,Arial,sans-serif;background:var(--bg-body);color:var(--text-primary);line-height:1.15;font-weight:400}
body.light{--bg-hero:#fff;--bg-body:#f5f5f5;--bg-card:#fff;--text-primary:#262626;--text-secondary:#555;--text-meta:#757575;--border:rgba(0,0,0,0.1)}

header{background:var(--bg-hero);padding:32px 40px 24px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--border)}
header h1{font-weight:300;font-size:22px;text-transform:uppercase;letter-spacing:2px;color:var(--text-primary)}
header .date{font-weight:400;font-size:13px;color:var(--text-meta);text-transform:uppercase;letter-spacing:1px;margin-top:4px}
#themeToggle{background:var(--bg-card);border:1px solid var(--border);color:var(--text-primary);padding:8px 16px;font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:1px;cursor:pointer;font-family:inherit}
#themeToggle:hover{border-color:var(--accent);color:var(--accent)}

.container{max-width:1400px;margin:0 auto;padding:24px 40px}

.kpi-row{display:grid;grid-template-columns:repeat(6,1fr);gap:16px;margin-bottom:32px}
.kpi-card{background:var(--bg-card);padding:20px;border:1px solid var(--border)}
.kpi-card .label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;color:var(--text-meta);margin-bottom:8px}
.kpi-card .value{font-size:26px;font-weight:300;color:var(--text-primary)}

table{width:100%;border-collapse:collapse;background:var(--bg-card);border:1px solid var(--border)}
thead th{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--text-meta);padding:14px 12px;text-align:left;border-bottom:1px solid var(--border);cursor:pointer;user-select:none;white-space:nowrap}
thead th:hover{color:var(--accent)}
thead th .sort-indicator{margin-left:4px;font-size:10px}
tbody tr{cursor:pointer;transition:background .15s}
tbody tr:hover{background:rgba(28,105,212,0.06)}
tbody tr.player-row td{padding:12px;border-bottom:1px solid var(--border);font-size:14px;font-weight:400;white-space:nowrap}
tbody tr.expanded-row td{padding:0;border-bottom:1px solid var(--border)}
.expanded-content{padding:16px 24px 20px;background:var(--bg-card)}
.expanded-content .section-title{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;color:var(--text-meta);margin-bottom:10px;font-variant:small-caps}
.expanded-content .section-title:not(:first-child){margin-top:20px}

.mini-table{width:100%;border-collapse:collapse;background:transparent;border:1px solid var(--border);margin-bottom:4px}
.mini-table th{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--text-meta);padding:8px 10px;text-align:left;border-bottom:1px solid var(--border)}
.mini-table td{padding:7px 10px;font-size:13px;border-bottom:1px solid var(--border)}

.history-grid{display:grid;grid-template-columns:120px repeat(4,1fr);border:1px solid var(--border)}
.history-grid .h-cell{padding:8px 10px;font-size:12px;border-bottom:1px solid var(--border);border-right:1px solid var(--border)}
.history-grid .h-header{font-weight:700;text-transform:uppercase;letter-spacing:1px;font-size:10px;color:var(--text-meta);background:var(--bg-card)}
.history-grid .h-header.yesterday{background:var(--accent);color:#fff}
.history-grid .h-label{font-weight:700;text-transform:uppercase;font-size:10px;letter-spacing:0.5px;color:var(--text-meta);display:flex;align-items:center}
.history-grid .h-value{font-weight:400;color:var(--text-primary)}
.history-grid .h-value.yesterday{font-weight:700}
.history-grid .h-value.dash{color:var(--text-meta)}

.pos{color:var(--green)}
.neg{color:var(--red)}

footer{padding:24px 40px;text-align:center}
footer p{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--text-meta)}

@media(max-width:900px){
 .kpi-row{grid-template-columns:repeat(3,1fr)}
 .container{padding:16px 16px}
 header{padding:20px 16px 16px}
 .history-grid{grid-template-columns:100px repeat(4,1fr);font-size:11px}
}
@media(max-width:600px){
 .kpi-row{grid-template-columns:repeat(2,1fr)}
}
</style>
</head>

var COLS = [
 {key:"username",label:"Username",type:"text"},
 {key:"deposits",label:"Deposits (\u20ac)",type:"num"},
 {key:"depCount",label:"# Deps",type:"num"},
 {key:"totalTO",label:"Total TO (\u20ac)",type:"num"},
 {key:"casinoTO",label:"Casino TO (\u20ac)",type:"num"},
 {key:"casinoGGR",label:"Casino GGR (\u20ac)",type:"num"},
 {key:"bets",label:"Bets",type:"num"},
 {key:"toDep",label:"TO/Dep",type:"ratio"},
 {key:"ggrDep",label:"GGR/Dep",type:"ratio"}
];

var sortCol = 1;
var sortAsc = false;
var expandedId = null;

function fmt(v,type){
 if(v===null||v===undefined||v==="-")return"\u2013";
 if(type==="num")return Number(v).toLocaleString("en-US",{minimumFractionDigits:2,maximumFractionDigits:2});
 if(type==="ratio")return Number(v).toFixed(4)+"x";
 return v;
}
function ggrClass(v){return v>0?"pos":v<0?"neg":""}

function renderKPIs(){
 var flaggedDeps=0,flaggedCTO=0,sumToDep=0,sumGgrDep=0;
 FLAGGED.forEach(function(p){flaggedDeps+=p.deposits;flaggedCTO+=p.casinoTO;sumToDep+=p.toDep;sumGgrDep+=p.ggrDep});
 var kpis=[
  {label:"TOTAL SCREENED",value:TOTAL_SCREENED.toLocaleString()},
  {label:"FLAGGED",value:FLAGGED.length},
  {label:"FLAGGED DEPOSITS",value:"\u20ac"+flaggedDeps.toLocaleString("en-US",{minimumFractionDigits:2,maximumFractionDigits:2})},
  {label:"FLAGGED CASINO TO",value:"\u20ac"+flaggedCTO.toLocaleString("en-US",{minimumFractionDigits:2,maximumFractionDigits:2})},
  {label:"AVG TO/DEP",value:(sumToDep/FLAGGED.length).toFixed(4)+"x"},
  {label:"AVG GGR/DEP",value:(sumGgrDep/FLAGGED.length).toFixed(4)+"x"}
 ];
 var html="";
 kpis.forEach(function(k){html+='<div class="kpi-card"><div class="label">'+k.label+'</div><div class="value">'+k.value+'</div></div>'});
 document.getElementById("kpiRow").innerHTML=html;
}

function renderHeader(){
 var html="";
 COLS.forEach(function(c,i){
  var ind="";
  if(i===sortCol)ind='<span class="sort-indicator">'+(sortAsc?"\u25B2":"\u25BC")+'</span>';
  html+='<th onclick="doSort('+i+')">'+c.label+ind+'</th>';
 });
 document.getElementById("tableHead").innerHTML=html;
}

function doSort(i){
 if(sortCol===i)sortAsc=!sortAsc;
 else{sortCol=i;sortAsc=i===0}
 sortData();renderHeader();renderBody();
}

function sortData(){
 var key=COLS[sortCol].key;
 FLAGGED.sort(function(a,b){
  var va=a[key],vb=b[key];
  if(typeof va==="string")return sortAsc?va.localeCompare(vb):vb.localeCompare(va);
  return sortAsc?va-vb:vb-va;
 });
}

function renderBody(){
 var html="";
 FLAGGED.forEach(function(p){
  html+='<tr class="player-row" onclick="toggleExpand(\''+p.id+'\')">';
  COLS.forEach(function(c){
   var v=p[c.key];
   var cls=(c.key==="casinoGGR")?ggrClass(v):"";
   html+='<td class="'+cls+'">'+fmt(v,c.type)+'</td>';
  });
  html+='</tr>';
  if(expandedId===p.id){
   html+='<tr class="expanded-row"><td colspan="'+COLS.length+'">'+buildExpanded(p)+'</td></tr>';
  }
 });
 document.getElementById("tableBody").innerHTML=html;
}

function toggleExpand(id){expandedId=expandedId===id?null:id;renderBody()}

function buildExpanded(p){
 var h='<div class="expanded-content">';
 // Game breakdown
 h+='<div class="section-title">Game Breakdown</div>';
 var games=GAMES[p.id]||[];
 if(games.length){
  h+='<table class="mini-table"><thead><tr><th>Game</th><th>Bets</th><th>Turnover (\u20ac)</th><th>GGR (\u20ac)</th></tr></thead><tbody>';
  games.forEach(function(g){
   h+='<tr><td>'+g.game+'</td><td>'+g.bets+'</td><td>'+fmt(g.turnover,"num")+'</td><td class="'+ggrClass(g.ggr)+'">'+fmt(g.ggr,"num")+'</td></tr>';
  });
  h+='</tbody></table>';
 } else {
  h+='<p style="color:var(--text-meta);font-size:13px">No game data</p>';
 }
 // 4-day comparison
 h+='<div class="section-title">4-Day Comparison</div>';
 var dates=["05/04/2026","06/04/2026","07/04/2026","08/04/2026"];
 var labels=["05 APR","06 APR","07 APR","08 APR *"];
 var hist=HISTORY[p.id]||{};
 var metrics=[
  {label:"Deposits",key:"deposits",type:"num"},
  {label:"# Deposits",key:"depCount",type:"int"},
  {label:"Turnover",key:"totalTO",type:"num"},
  {label:"Casino TO",key:"casinoTO",type:"num"},
  {label:"Casino GGR",key:"casinoGGR",type:"num"},
  {label:"Bets",key:"bets",type:"int"},
  {label:"Casino TO/Dep",key:"_toDep",type:"ratio"},
  {label:"Casino GGR/Dep",key:"_ggrDep",type:"ratio"}
 ];
 h+='<div class="history-grid">';
 // Header row
 h+='<div class="h-cell h-header"></div>';
 dates.forEach(function(d,i){
  var cls=i===3?"h-cell h-header yesterday":"h-cell h-header";
  h+='<div class="'+cls+'">'+labels[i]+'</div>';
 });
 // Metric rows
 metrics.forEach(function(m){
  h+='<div class="h-cell h-label">'+m.label+'</div>';
  dates.forEach(function(d,i){
   var day=hist[d];
   var val="\u2013";
   var isYesterday=i===3;
   if(day){
    if(m.key==="_toDep"){val=day.deposits>0?(day.casinoTO/day.deposits).toFixed(4)+"x":"\u2013"}
    else if(m.key==="_ggrDep"){val=day.deposits>0?(day.casinoGGR/day.deposits).toFixed(4)+"x":"\u2013"}
    else if(m.type==="int"){val=day[m.key]}
    else{val=fmt(day[m.key],"num")}
   }
   var vcls="h-cell h-value"+(isYesterday?" yesterday":"")+(val==="\u2013"?" dash":"");
   if(m.key==="casinoGGR"&&day&&day[m.key]!==undefined){
    vcls+=" "+ggrClass(day[m.key]);
   }
   if(m.key==="_ggrDep"&&day&&day.deposits>0){
    vcls+=" "+ggrClass(day.casinoGGR);
   }
   h+='<div class="'+vcls+'">'+val+'</div>';
  });
 });
 h+='</div></div>';
 return h;
}

sortData();renderKPIs();renderHeader();renderBody();
